<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход - БИКО</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html, body {
        height: 100%;
        background-color: #111827; /* bg-gray-900 */
      }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md p-8 space-y-8 bg-gray-800 rounded-lg shadow-lg border border-gray-700">
        <div>
            <h2 class="text-3xl font-extrabold text-center text-white">
                <a href="index.html"><span class="text-amber-500">БИ</span><span class="text-white">КО</span></a>
            </h2>
            <p class="mt-2 text-center text-sm text-gray-400">
                Вход для просмотра портфолио
            </p>
        </div>
        <form id="loginForm" class="mt-8 space-y-6" action="#" method="POST">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="username" class="sr-only">Логин</label>
                    <input id="username" name="username" type="text" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-600 bg-gray-700 placeholder-gray-400 text-white rounded-t-md focus:outline-none focus:ring-amber-500 focus:border-amber-500 focus:z-10 sm:text-sm" placeholder="Логин">
                </div>
                <div>
                    <label for="password" class="sr-only">Пароль</label>
                    <input id="password" name="password" type="password" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-600 bg-gray-700 placeholder-gray-400 text-white rounded-b-md focus:outline-none focus:ring-amber-500 focus:border-amber-500 focus:z-10 sm:text-sm" placeholder="Пароль">
                </div>
            </div>

            <p id="error-message" class="text-red-500 text-sm text-center hidden"></p>

            <div>
                <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-amber-600 hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-amber-500 transition-colors">
                    Войти
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isAuthenticated') === 'true') {
                window.location.href = 'portfolio.html';
                return;
            }

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    const errorMessage = document.getElementById('error-message');

                    // Simple check for credentials
                    if (username === 'bicooper' && password === 'lansrk8925') {
                        localStorage.setItem('isAuthenticated', 'true');
                        window.location.href = 'portfolio.html';
                    } else {
                        errorMessage.textContent = 'Неверный логин или пароль.';
                        errorMessage.classList.remove('hidden');
                    }
                });
            }
        });
    </script>
</body>
</html>
